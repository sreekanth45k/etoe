phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Installing AWS CLI and curl...
      - apt-get update && apt-get install -y awscli curl || yum install -y awscli curl || dnf install -y awscli curl


  pre_build:
    commands:
      - echo Setting up environment...

  build:
    commands:
      - echo Building the WAR file...
      - mvn clean package
      - echo WAR build complete

  post_build:
    commands:
      - echo Deploying WAR to Tomcat...
      - curl -v -u admin:admin -T target/Ecomm.war "http://3.109.208.89:8080/manager/text/deploy?path=/Ecomm&update=true"
      - echo Uploading WAR to S3...
      - aws s3 cp target/Ecomm.war s3://your-bucket-name/Ecomm.war
      - echo Build, Deploy and Upload complete.

artifacts:
  files:
    - target/Ecomm.war
