version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Installing required tools...
      - yum install -y unzip curl
      - echo Installing AWS CLI...
      - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      - unzip awscliv2.zip
      - sudo ./aws/install
      - aws --version

  pre_build:
    commands:
      - echo Preparing the build environment...

  build:
    commands:
      - echo Building the WAR file with Maven...
      - mvn clean package
      - echo WAR build completed.

  post_build:
    commands:
      - echo Deploying WAR to Tomcat...
      - curl -v -u "$TOMCAT_USERNAME:$TOMCAT_PASSWORD" -T target/Ecomm.war "http://3.109.208.89:8080/manager/text/deploy?path=/Ecomm&update=true"
      - echo Uploading WAR to S3 bucket: $S3_BUCKET
      - aws s3 cp target/Ecomm.war s3://$S3_BUCKET/Ecomm.war
      - echo ✅ Build, deployment to Tomcat, and upload to S3 completed successfully.

artifacts:
  files:
    - target/Ecomm.war
