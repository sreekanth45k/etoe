version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "--- Detecting OS ---"
      - cat /etc/os-release # To re-confirm Amazon Linux 2023

      - echo "--- Running Network Connectivity Tests ---"
      # Test if the container can reach external IPs (Google DNS)
      - ping -c 4 8.8.8.8 || { echo "ERROR: Cannot ping 8.8.8.8. Network connectivity issue suspected. Please check VPC/Subnet/Security Group/NAT Gateway configuration."; exit 1; }
      # Test if the container can resolve DNS (e.g., google.com)
      - ping -c 4 google.com || { echo "ERROR: Cannot ping google.com. DNS resolution or network issue suspected."; exit 1; }
      - echo "--- Network Tests Complete ---"

      - echo "--- Installing AWS CLI ---"
      - echo "Downloading AWS CLI v2 bundle..."
      - curl -v "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      # Check if curl command succeeded (exit status 0)
      - if [ $? -ne 0 ]; then echo "ERROR: curl failed to download awscliv2.zip. Check network or URL."; exit 1; fi

      - echo "Unzipping AWS CLI v2 bundle..."
      - unzip awscliv2.zip
      # Check if unzip command succeeded
      - if [ $? -ne 0 ]; then echo "ERROR: unzip failed. File might be corrupt or unzip utility is missing/broken."; exit 1; fi

      - echo "Running AWS CLI installer..."
      - sudo ./aws/install
      # Check if install script succeeded
      - if [ $? -ne 0 ]; then echo "ERROR: AWS CLI install script failed to execute properly."; exit 1; fi

      - echo "Verifying AWS CLI installation..."
      - aws --version
      # Check if aws command is found and working
      - if [ $? -ne 0 ]; then echo "ERROR: AWS CLI not found in PATH or version check failed after install."; exit 1; fi
      - echo "--- AWS CLI Installation Complete ---"


  pre_build:
    commands:
      - echo "--- Preparing the environment ---"

  build:
    commands:
      - echo "--- Building WAR file ---"
      - mvn clean package
      - echo "WAR file generated."

  post_build:
    commands:
      - echo "--- Deploying WAR to Tomcat ---"
      - curl -v -u "$TOMCAT_USERNAME:$TOMCAT_PASSWORD" -T target/Ecomm.war "http://3.109.208.89:8080/manager/text/deploy?path=/Ecomm&update=true"
      - echo "--- Uploading WAR to S3 ---"
      - aws s3 cp target/Ecomm.war s3://$S3_BUCKET/Ecomm.war
      - echo "✅ Deployment and upload complete."

artifacts:
  files:
    - target/Ecomm.war
