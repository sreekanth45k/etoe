version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "--- Installing AWS CLI (Alternative Method) ---"
      # Method 1: Install via yum (preferred for Amazon Linux 2023)
      - sudo dnf install -y awscli || {
          echo "--- Fallback: Manual AWS CLI Install ---";
          curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip";
          unzip -q awscliv2.zip;
          sudo ./aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update;
        }
      - aws --version
      - echo "AWS CLI installed successfully"

  build:
    commands:
      - echo "--- Building WAR file ---"
      - mvn clean package

  post_build:
    commands:
      - echo "--- Deploying WAR to Tomcat ---"
      - curl -f -u "$TOMCAT_USERNAME:$TOMCAT_PASSWORD" -T target/Ecomm.war "http://3.109.208.89:8080/manager/text/deploy?path=/Ecomm&update=true"
      - echo "--- Uploading WAR to S3 ---"
      - aws s3 cp target/Ecomm.war "s3://$S3_BUCKET/Ecomm.war"
      - echo "✅ Deployment complete"

artifacts:
  files:
    - target/Ecomm.war
