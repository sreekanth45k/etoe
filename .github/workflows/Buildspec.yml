version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "--- Installing dependencies ---"
      - sudo dnf install -y awscli unzip
      - aws --version

  pre_build:
    commands:
      - echo "--- Environment check ---"
      - echo "Current directory: $PWD"
      - echo "Directory contents:"
      - ls -la
      - echo "Target directory contents:"
      - ls -la target/ || echo "Target directory not found (this may be normal)"

  build:
    commands:
      - echo "--- Building application ---"
      - mvn clean package
      - echo "--- Verifying build output ---"
      - ls -la target/
      - if [ ! -f "target/Ecomm.war" ]; then echo "ERROR: WAR file not found!"; exit 1; fi

  post_build:
    commands:
      - echo "--- Uploading to S3 ---"
      - echo "Uploading target/Ecomm.war to s3://${S3_BUCKET}/Ecomm.war"
      - aws s3 ls "s3://${S3_BUCKET}/" || echo "WARNING: Cannot list bucket contents - may not have permissions"
      - aws s3 cp target/Ecomm.war "s3://${S3_BUCKET}/Ecomm.war"
      
      - echo "--- Deploying to Tomcat ---"
      - curl -v -u "${TOMCAT_USERNAME}:${TOMCAT_PASSWORD}" -T target/Ecomm.war "http://3.109.208.89:8080/manager/text/deploy?path=/Ecomm&update=true"

artifacts:
  files:
    - target/Ecomm.war
  name: ecom-artifact
